<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ログイン - CampusTrade</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f7f6; margin: 0; }
        .login-container { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; }
        h2 { text-align: center; margin-bottom: 24px; color: #333; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 8px; color: #666; }
        input[type="email"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #007bff; border: none; color: white; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        .error { color: red; text-align: center; margin-bottom: 16px; }
        .logout { color: green; text-align: center; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>CampusTrade ログイン</h2>
        <!-- エラーメッセージ -->
        <div th:if="${param.error}" class="error">
            メールアドレスまたはパスワードが違います。
        </div>
        <!-- ログアウトメッセージ -->
        <div th:if="${param.logout}" class="logout">
            ログアウトしました。
        </div>
        
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>メールアドレス</label>
                <input type="email" name="username" required autofocus />
            </div>
            <div class="form-group">
                <label>パスワード</label>
                <input type="password" name="password" required />
            </div>
            <button type="submit">ログイン</button>
        </form>
    </div>
</body>
</html>
