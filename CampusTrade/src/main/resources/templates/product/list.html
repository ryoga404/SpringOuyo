<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品一覧 - CampusTrade</title>
    <style>
        :root {
            --primary: #2563eb; --primary-dark: #1d4ed8; --bg: #f8fafc;
            --surface: #ffffff; --text: #0f172a; --text-muted: #64748b;
            --border: #e2e8f0; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; line-height: 1.5; }
        .navbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); text-decoration: none; }
        
        .dropdown { 
            position: relative; 
            display: inline-block; 
            padding-bottom: 15px;  
            margin-bottom: -15px; 
        }
        .user-name-btn { font-weight: 600; color: var(--text); background: #eff6ff; padding: 0.5rem 1rem; border-radius: 20px; text-decoration: none; cursor: pointer; display: inline-flex; align-items: center; gap: 0.25rem; transition: background 0.2s; }
        .user-name-btn:hover { background: #dbeafe; }
        .user-name-btn::after { content: " ▾"; font-size: 0.8rem; color: var(--primary); }
        
        .dropdown-menu { 
            display: none; 
            position: absolute; 
            right: 0; 
            top: 40px; 
            background: var(--surface); 
            min-width: 180px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05); 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            overflow: hidden; 
            z-index: 200; 
        }
        .dropdown-menu a { color: var(--text); padding: 0.75rem 1rem; text-decoration: none; display: block; font-size: 0.9rem; font-weight: 500; transition: background 0.2s; }
        .dropdown-menu a:hover { background: #f1f5f9; color: var(--primary); }
        .dropdown:hover .dropdown-menu { display: block; } 
        .logout-btn { width: 100%; text-align: left; background: none; border: none; padding: 0.75rem 1rem; font-size: 0.9rem; color: var(--danger); cursor: pointer; font-weight: 600; transition: background 0.2s; }
        .logout-btn:hover { background: #fee2e2; }

        .btn { padding: 0.6rem 1.2rem; border-radius: 8px; font-weight: 600; text-decoration: none; cursor: pointer; border: none; transition: all 0.2s; font-size: 0.9rem; display: inline-flex; align-items: center; justify-content: center; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        
        .container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
        
        /* 💡 検索ボックスエリアのデザイン調整 */
        .search-section { background: var(--surface); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        .search-form { display: flex; flex-direction: column; gap: 0.75rem; }
        .search-row { display: flex; gap: 0.75rem; }
        .input-text { flex: 1; padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; outline: none; }
        .select-control { flex: 1; padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; outline: none; background-color: #fff; }
        
        .tag-container { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
        .tag { background: #f1f5f9; color: var(--text-muted); padding: 0.3rem 0.75rem; border-radius: 6px; text-decoration: none; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; }
        .tag:hover { background: var(--primary); color: white; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: transform 0.2s, box-shadow: 0.2s; text-decoration: none; color: inherit; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .card-thumb { width: 100%; height: 160px; object-fit: cover; background: #f1f5f9; display: block; }
        .card-thumb-placeholder { width: 100%; height: 160px; background: #f1f5f9; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-size: 2rem; }
        .card-body { padding: 1.25rem; display: flex; flex-direction: column; flex: 1; }
        .card-title { font-size: 1.15rem; font-weight: 700; margin: 0 0 0.5rem 0; color: var(--text); }
        .price-tag { font-size: 1.4rem; font-weight: 800; color: var(--danger); margin-bottom: 0.75rem; }
        .price-tag::after { content: " 円"; font-size: 0.9rem; font-weight: 500; color: var(--text-muted); }
        .meta-info { font-size: 0.85rem; color: var(--text-muted); margin-top: auto; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 0.75rem; }
        .badge { font-size: 0.75rem; font-weight: 700; padding: 0.25rem 0.6rem; border-radius: 6px; }
        .OPEN { background: #e0f2fe; color: #0369a1; }
        .LOCKED { background: #fef3c7; color: #b45309; }
        .CLOSED { background: #f1f5f9; color: #475569; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/products" class="logo">🏫 CampusTrade</a>
        
        <div class="dropdown">
            <div class="user-name-btn">
                👤 <span th:text="${loginUser != null ? loginUser.nickname : 'ゲスト'}">ゲスト</span> さん
            </div>
            <div class="dropdown-menu">
                <a href="/products/mypage">📂 マイページ</a>
                <a href="/products/mypage#fav-section">⭐ お気に入り一覧</a>
                <a href="/products/nickname">✏️ ニックネーム変更</a>
                <a sec:authorize="hasRole('ADMIN')" href="/admin/dashboard">🛡️ 管理者ダッシュボード</a>
                <hr style="border: none; border-top: 1px solid var(--border); margin: 0;">
                <form th:action="@{/logout}" method="post" style="margin: 0;">
                    <button type="submit" class="logout-btn">🚪 ログアウト</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h2 style="margin: 0; font-weight: 800;">出品中の商品</h2>
            <a href="/products/new" class="btn btn-primary" style="background:#10b981;">+ 商品を出品する</a>
        </div>

        <!-- 💡 検索セクション：大中小分類の3連選択ボックスを綺麗に統合 -->
        <div class="search-section">
            <form th:action="@{/products}" method="get" class="search-form">
                <div class="search-row">
                    <input type="text" name="keyword" class="input-text" placeholder="キーワードから検索..." th:value="${keyword}">
                    <button type="submit" class="btn btn-primary">検索</button>
                </div>
                
                <!-- 💡 3連選択ボックスの配置行 -->
                <div class="search-row">
                    <select id="bigCategory" class="select-control">
                        <option value="">-- 全ての大分類 --</option>
                    </select>
                    <select id="midCategory" class="select-control" disabled>
                        <option value="">-- 全ての中分類 --</option>
                    </select>
                    <select id="smallCategorySelect" class="select-control" disabled>
                        <option value="">-- 全ての小分類 --</option>
                    </select>
                    <!-- 実際にサーバーへ送信されるカテゴリID用の隠しパラメータ -->
                    <input type="hidden" name="categoryId" id="finalCategoryId">
                </div>
            </form>
            
            <div class="tag-container">
                <span style="font-size:0.85rem; color:var(--text-muted); align-self:center;">🏷️ 定番タグ:</span>
                <a href="/products" class="tag">全て見る</a>
                <a href="/products?category=教科書" class="tag">#教科書</a>
                <a href="/products?category=小型家電" class="tag">#家電</a>
                <a href="/products?category=収納ボックス、クッション、ポスター" class="tag">#家具</a>
                <a href="/products?category=消耗品" class="tag">#日用品</a>
            </div>
        </div>

        <div class="grid">
            <a th:each="product : ${products}" th:href="@{/products/{id}(id=${product.id})}" class="card">
                <img th:if="${product.hasImage}" th:src="@{'/images/products/' + ${product.id} + '.jpg'}" class="card-thumb" alt="商品画像">
                <div th:unless="${product.hasImage}" class="card-thumb-placeholder">🖼️</div>
                <div class="card-body">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.25rem;">
                        <span class="badge" th:classappend="${product.status}" th:text="${product.status}">OPEN</span>
                        <span style="font-size: 0.8rem; color: var(--text-muted); background: #f1f5f9; padding: 0.2rem 0.5rem; border-radius: 4px;" th:text="${product.category}">カテゴリ</span>
                    </div>
                    <h3 class="card-title" th:text="${product.productName}">商品名</h3>
                    <div class="price-tag" th:text="${product.price}">0</div>
                    <div class="meta-info">
                        <span>👤 <span th:text="${product.seller.nickname}">出品者</span></span>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <!-- 💡 大中小連動処理のためのJavaScriptを埋め込み -->
    <script th:inline="javascript">
        const categoryData = /*[[${categories}]]*/ [];
        const selectedCategoryId = /*[[${selectedCategoryId}]]*/ null;

        const bigSelect = document.getElementById('bigCategory');
        const midSelect = document.getElementById('midCategory');
        const smallSelect = document.getElementById('smallCategorySelect');
        const finalInput = document.getElementById('finalCategoryId');

        // 1. 大分類を生成
        const bigCategories = [...new Set(categoryData.map(c => c.bigCategory))];
        bigCategories.forEach(big => {
            if(big) {
                const opt = document.createElement('option');
                opt.value = big; opt.textContent = big;
                bigSelect.appendChild(opt);
            }
        });

        // 2. 大分類選択時の連動
        bigSelect.addEventListener('change', function() {
            midSelect.innerHTML = '<option value="">-- 全ての中分類 --</option>';
            smallSelect.innerHTML = '<option value="">-- 全ての小分類 --</option>';
            midSelect.disabled = true; smallSelect.disabled = true;
            finalInput.value = "";

            if (!this.value) return;

            const filtered = categoryData.filter(c => c.bigCategory === this.value);
            const midCategories = [...new Set(filtered.map(c => c.midCategory))];

            midCategories.forEach(mid => {
                if(mid) {
                    const opt = document.createElement('option');
                    opt.value = mid; opt.textContent = mid;
                    midSelect.appendChild(opt);
                }
            });
            midSelect.disabled = false;
        });

        // 3. 中分類選択時の連動
        midSelect.addEventListener('change', function() {
            smallSelect.innerHTML = '<option value="">-- 全ての小分類 --</option>';
            smallSelect.disabled = true;
            finalInput.value = "";

            if (!this.value) return;

            const filtered = categoryData.filter(c => c.bigCategory === bigSelect.value && c.midCategory === this.value);
            
            if (filtered.length > 0) {
                finalInput.value = filtered[0].id; // 一時的なIDセット
            }

            let hasSmall = false;
            filtered.forEach(c => {
                if(c.smallCategory) {
                    const opt = document.createElement('option');
                    opt.value = c.id;
                    opt.textContent = c.smallCategory;
                    smallSelect.appendChild(opt);
                    hasSmall = true;
                }
            });

            if (hasSmall) smallSelect.disabled = false;
        });

        // 4. 小分類選択時の確定
        smallSelect.addEventListener('change', function() {
            if (this.value) {
                finalInput.value = this.value;
            } else {
                const filtered = categoryData.filter(c => c.bigCategory === bigSelect.value && c.midCategory === midSelect.value);
                if (filtered.length > 0) finalInput.value = filtered[0].id;
            }
        });

        // 5. 検索後にページが再読み込みされたとき、選択されていた大・中・小分類を復元する
        if (selectedCategoryId) {
            const selected = categoryData.find(c => c.id === selectedCategoryId);
            if (selected) {
                bigSelect.value = selected.bigCategory;
                bigSelect.dispatchEvent(new Event('change'));

                if (selected.midCategory) {
                    midSelect.value = selected.midCategory;
                    midSelect.dispatchEvent(new Event('change'));
                }

                if (selected.smallCategory) {
                    smallSelect.value = selected.id;
                }

                finalInput.value = selectedCategoryId;
            }
        }
    </script>
</body>
</html>
