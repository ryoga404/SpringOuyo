<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ユーザー登録 - CampusTrade</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f7f6; margin: 0; }
        .register-container { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; }
        h2 { text-align: center; margin-bottom: 24px; color: #333; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 8px; color: #666; }
        input[type="text"], input[type="email"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #28a745; border: none; color: white; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #218838; }
        .error { color: red; text-align: center; margin-bottom: 16px; }
        .link { text-align: center; margin-top: 20px; font-size: 14px; }
        .link a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="register-container">
        <h2>ユーザー登録</h2>
        
        <!-- エラーがあった場合の表示 -->
        <div th:if="${error}" class="error" th:text="${error}"></div>
        
        <form th:action="@{/register}" method="post">
            <div class="form-group">
                <label>ユーザー名</label>
                <input type="text" name="username" required autofocus />
            </div>
            <div class="form-group">
                <label>メールアドレス</label>
                <input type="email" name="email" required />
            </div>
            <div class="form-group">
                <label>パスワード</label>
                <input type="password" name="password" required />
            </div>
            <button type="submit">アカウント作成</button>
        </form>
        
        <div class="link">
            <a th:href="@{/login}">すでにアカウントをお持ちの方はこちら</a>
        </div>
    </div>
</body>
</html>
